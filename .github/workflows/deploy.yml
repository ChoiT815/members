name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploys:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
           chmod +x ./gradlew
           ./gradlew bootJar

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build & push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/members:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/members:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/members:latest
            docker stop members || true
            docker rm members || true
            docker run -d --name members \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${{ secrets.DOCKER_USERNAME }}/members:latest